services:
  - type: web
    name: vision-scanner
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 30
    envVars:
      - key: VISION_API_KEY
        sync: false  # Renderダッシュボードで手動設定
      - key: ADMIN_SECRET
        sync: false
      - key: FLASK_DEBUG
        value: "false"
      - key: VERIFY_SSL
        value: "true"
      - key: NO_PROXY_MODE
        value: "true"
      - key: TRUST_PROXY
        value: "true"  # Renderロードバランサー経由の正しいクライアントIP取得に必須
      - key: TRUST_PROXY_HOPS
        value: "1"     # Renderは1段のリバースプロキシ
      - key: PYTHON_VERSION
        value: "3.12.0"
