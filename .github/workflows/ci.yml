name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ブランチ保護ルールで「test」ジョブをPRマージ必須に設定すること:
#   Settings > Branches > Branch protection rules > Require status checks
#   必須チェック: test (3.11), test (3.12), test (3.13)

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Python ${{ matrix.python-version }} セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 依存関係インストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt
          pip install -r requirements-dev.txt

      - name: シークレット検出（detect-secrets）
        run: |
          pip install detect-secrets
          detect-secrets scan --exclude-files '\.lock$' > .secrets-ci.json
          detect-secrets audit --report .secrets-ci.json || true

      - name: Ruff リントチェック
        run: python -m ruff check .

      - name: mypy 型チェック
        run: python -m mypy app.py vision_api.py rate_limiter.py pii_mask.py translations.py vision_types.py

      - name: Bandit セキュリティスキャン
        run: python -m bandit -r . --exclude ./tests,./venv,./.venv -q

      - name: pip-audit 脆弱性チェック
        run: python -m pip_audit

      - name: OSV-Scanner 間接依存の脆弱性チェック
        uses: google/osv-scanner-action/osv-scanner-action@v2
        with:
          scan-args: |-
            --lockfile=requirements-lock.txt

      - name: pytest テスト実行
        env:
          VISION_API_KEY: "test-dummy-key"
        run: python -m pytest tests/ -v --tb=short
