name: シークレット定期スキャン

on:
  schedule:
    # 毎週月曜 9:00 JST（日曜 24:00 UTC）
    - cron: "0 0 * * 1"
  workflow_dispatch: # 手動実行も可能

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: detect-secrets インストール
        run: pip install detect-secrets

      - name: フルスキャン実行
        id: scan
        run: |
          detect-secrets scan \
            --exclude-files '\.lock$' \
            --exclude-files '\.secrets-baseline$' \
            --exclude-files 'venv/' \
            --exclude-files '\.venv/' \
            > .secrets-scan-result.json

          # 検出件数を取得（results配列の全エントリ数）
          COUNT=$(python3 -c "
          import json
          with open('.secrets-scan-result.json') as f:
              data = json.load(f)
          total = sum(len(v) for v in data.get('results', {}).values())
          print(total)
          ")
          echo "secret_count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "検出件数: $COUNT"

      - name: 検出結果をIssueで通知
        if: steps.scan.outputs.secret_count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = JSON.parse(fs.readFileSync('.secrets-scan-result.json', 'utf8'));
            const files = Object.keys(result.results || {});
            const count = ${{ steps.scan.outputs.secret_count }};

            let body = `## detect-secrets 定期スキャン結果\n\n`;
            body += `**検出件数: ${count} 件**\n\n`;
            body += `| ファイル | 行番号 | 種別 |\n|---------|--------|------|\n`;

            for (const file of files) {
              for (const secret of result.results[file]) {
                body += `| \`${file}\` | ${secret.line_number} | ${secret.type} |\n`;
              }
            }

            body += `\n### 対処手順\n`;
            body += `1. 該当ファイルを確認し、シークレットが本物か誤検知かを判定\n`;
            body += `2. 本物の場合: シークレットをローテーションし、環境変数に移行\n`;
            body += `3. 誤検知の場合: ベースラインに追加 (\`detect-secrets scan --update .secrets-baseline\`)\n`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[自動] detect-secrets: ${count}件のシークレット候補を検出`,
              body: body,
              labels: ['security']
            });
